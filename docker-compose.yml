services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: mysecretpassword 
      POSTGRES_USER: myuser 
      POSTGRES_DB: mydatabase 
    ports:
      - "5432:5432" 
    volumes:
      - postgres-data:/var/lib/postgresql/data 

volumes:
  postgres-data:
    driver: local
